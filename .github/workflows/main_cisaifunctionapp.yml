name: Build and deploy dotnet app to Azure Function App - CISAIFunctionApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build
        shell: pwsh
        run: |
          dotnet restore
          dotnet build --configuration Release --output ./output

      - name: Deploy
        uses: Azure/functions-action@v1
        with:
          app-name: 'CISAIFunctionApp'
          slot-name: 'Production'
          package: './output'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_9BD6F6C4C986412CB5CA1097E6791E5D }}